version: '3.8'

services:

  comments-spa-postgres:
    container_name: comments-spa-postgres
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "127.0.0.1:${DB_LOCAL_PORT}:${DB_PORT}"
    volumes:
      - comments-spa-volume-postgres:/var/lib/postgresql/data
    env_file:
      - ../backend/.env
    networks:
      - comments-spa-network

  comments-spa-redis:
    image: redis:7-alpine
    container_name: comments-spa-redis
    command: --port 6379 --save 60 1 --loglevel warning --requirepass ${REDIS_PASS}
    restart: always
    ports:
      - "127.0.0.1:${REDIS_LOCAL_PORT}:${REDIS_PORT}"
    volumes:
      - comments-spa-volume-redis:/data
    env_file:
      - ../backend/.env
    networks:
      - comments-spa-network

  comments-spa-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_WS_URL: ""
    container_name: comments-spa-frontend
    command: sh -c "cp -r /app/dist/. /frontend"
    volumes:
      - frontend_dist:/frontend
    networks:
      - comments-spa-network

  comments-spa-nginx:
    image: nginx:1.25-alpine
    restart: always
    environment:
      - DJANGO_SERVER_PORT=${DJANGO_SERVER_PORT}
    command: >
      /bin/sh -c "envsubst '$$DJANGO_SERVER_PORT'
      < /etc/nginx/nginx.conf.template
      > /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    volumes:
      - ../backend/static:/static
      - ../backend/media:/media
      - frontend_dist:/frontend
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
    ports:
      - ${NGINX_PORT}:80
    depends_on:
      - comments-spa-server
      - comments-spa-frontend
    networks:
      - comments-spa-network

  comments-spa-server:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: [ "/bin/bash", "/app/entrypoint.sh" ]
    ports:
      - ${DJANGO_SERVER_PORT}:${DJANGO_SERVER_PORT}
    volumes:
      - ../backend/static:/app/static
      - ../backend/media:/app/media
    restart: always
    env_file:
      - ../backend/${APP_ENV_FILE:-.env}
    depends_on:
      - comments-spa-postgres
      - comments-spa-redis
    networks:
      - comments-spa-network

  comments-spa-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery --app config worker -c 1 --loglevel=info
    restart: always
    volumes:
      - ../backend/media:/app/media
    env_file:
      - ../backend/${APP_ENV_FILE:-.env}
    depends_on:
      - comments-spa-redis
    networks:
      - comments-spa-network

volumes:
  comments-spa-volume-postgres:
  comments-spa-volume-redis:
  frontend_dist:

networks:
  comments-spa-network:
    name: comments-spa-network
    driver: bridge